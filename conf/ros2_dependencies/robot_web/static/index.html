<!DOCTYPE html>
<!--
  Interface web W0 du robot Didier -- page UNIQUE, vanilla JS, zéro dépendance
  externe (aucun CDN : la page doit fonctionner même hors ligne du reste
  d'Internet, seul le WebSocket vers le robot compte). Utilisable au téléphone
  (panneau technique, backstage) comme au PC (onglet spectacle).

  W0 = supervision + contenus + panneau technique. AUCUN bouton roues ni
  e_stop ici : la whitelist qui l'interdit vit côté serveur (web_protocol.py),
  cette page ne fait qu'illustrer ce que le serveur accepte déjà.
-->
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Didier -- pont web</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Bandeau permanent : mode robot/sim, connexion, RTT, écriture/lecture,
       prise de main. Toujours visible (position sticky, voir style.css) :
       c'est la sécurité n°1 de l'UI, "on doit TOUJOURS savoir à qui on parle". -->
  <header id="bandeau">
    <span id="badge-mode" class="badge badge-inconnu">INCONNU</span>
    <span id="badge-connexion" class="badge badge-off">déconnecté</span>
    <span id="rtt">RTT -- ms</span>
    <span id="badge-ecriture" class="badge badge-off">lecture seule</span>
    <button id="btn-prendre-main" type="button">Prendre la main</button>
    <span id="token-box" hidden>
      <input id="token-input" type="password" placeholder="token" autocomplete="off">
      <button id="btn-token" type="button">Connexion</button>
    </span>
  </header>

  <!-- Onglets : SPECTACLE (défaut) / TECHNIQUE. -->
  <nav id="onglets">
    <button class="onglet-btn actif" data-onglet="spectacle" type="button">Spectacle</button>
    <button class="onglet-btn" data-onglet="technique" type="button">Technique</button>
  </nav>

  <main>
    <!-- ============================= SPECTACLE ============================= -->
    <section id="onglet-spectacle" class="onglet actif">

      <button id="btn-stop-contenus" type="button">■ STOP CONTENUS</button>

      <section class="groupe">
        <h2>Animations</h2>
        <div id="grille-animations" class="grille"></div>
      </section>

      <section class="groupe">
        <h2>Visages</h2>
        <div id="grille-faces" class="grille"></div>
      </section>

      <section class="groupe">
        <h2>Sons</h2>
        <div id="grille-audios" class="grille"></div>
      </section>

      <section class="groupe">
        <h2>Lumières</h2>
        <div id="grille-robot-lights" class="grille"></div>
      </section>

    </section>

    <!-- ============================= TECHNIQUE ============================= -->
    <section id="onglet-technique" class="onglet">

      <section class="groupe">
        <h2>Servos</h2>
        <div id="servos"></div>
      </section>

      <section class="groupe">
        <h2>Relais</h2>
        <div id="grille-relais" class="grille"></div>
      </section>

      <section class="groupe">
        <h2>Gaze (suivi de tête, cou)</h2>
        <button class="bouton-catalogue" data-topic="gaze" data-value="on">Gaze ON</button>
        <button class="bouton-catalogue" data-topic="gaze" data-value="off">Gaze OFF</button>
      </section>

      <section class="groupe">
        <h2>Système</h2>
        <button id="btn-system-restart" type="button">Redémarrer</button>
        <button id="btn-system-shutdown" type="button">Éteindre</button>
      </section>

      <section class="groupe">
        <h2>État</h2>
        <div id="etat-topics"></div>
        <div id="etat-nodes"></div>
      </section>

    </section>
  </main>

  <!-- Journal des 5 dernières erreurs (visible dans les deux onglets). -->
  <footer>
    <h2>Erreurs récentes</h2>
    <ul id="journal-erreurs"></ul>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
