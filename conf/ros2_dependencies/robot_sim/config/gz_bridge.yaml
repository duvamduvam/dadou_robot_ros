# Bridge ros_gz : correspondance topics ROS 2 <-> Gazebo (Harmonic).
# Les noms côté gz sont fixés par les plugins déclarés dans
# robot_description/urdf/dadou_robot_gz.urdf.xacro.

- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# Interface standard des roues — le coeur de la Phase 2.
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/odom"
  gz_topic_name: "/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# TF odom -> base_link publié par le plugin DiffDrive.
- ros_topic_name: "/tf"
  gz_topic_name: "/tf_gz"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS

- ros_topic_name: "/joint_states"
  gz_topic_name: "/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

# Servos : cible de position en radians (mêmes noms que les servos du code).
- ros_topic_name: "/neck/position"
  gz_topic_name: "/neck/position"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/left_arm/position"
  gz_topic_name: "/left_arm/position"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/right_arm/position"
  gz_topic_name: "/right_arm/position"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/left_eye/position"
  gz_topic_name: "/left_eye/position"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/right_eye/position"
  gz_topic_name: "/right_eye/position"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

# LED (leds_sim_node, package robot_sim) : le monde `stage` charge le système
# gz UserCommands, qui expose /world/stage/material_color en écriture. Publier
# dessus change en direct le matériau (diffuse/emissive/ambient) d'un visual
# nommé de la scène -- pas besoin de republier le SDF ni de plugin dédié.
# entity_match=FIRST + entity.name=<link>_visual ciblent un visual précis
# (voir dadou_robot_gz.urdf.xacro : preserveFixedJoint sur les joints LED fixes
# pour garder ce nom stable, sinon la conversion URDF->SDF les fusionne dans
# torso_link_visual).
- ros_topic_name: "/material_color"
  gz_topic_name: "/world/stage/material_color"
  ros_type_name: "ros_gz_interfaces/msg/MaterialColor"
  gz_type_name: "gz.msgs.MaterialColor"
  direction: ROS_TO_GZ
