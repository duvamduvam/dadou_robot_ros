# Simulation Gazebo sur le PC de dev.
#
# SÉCURITÉ : ROS_DOMAIN_ID=43 par défaut — domaine DÉDIÉ à la simulation
# (le vrai robot est sur 42). Aucune commande envoyée à la sim ne peut
# atteindre Didier, même allumé sur le même réseau. Pour piloter la sim
# avec la télécommande, lancer celle-ci avec ROS_DOMAIN_ID=43.
services:
  dadou-sim:
    container_name: dadou-sim-container
    image: dadouuu/dadou-sim-x86:latest
    build:
      context: ../../..
      dockerfile: conf/docker/sim/Dockerfile-sim
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=${XAUTHORITY:-/tmp/.docker.xauth}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-43}
      - HEADLESS=${HEADLESS:-false}
      # animations_node (rejeu des séquences JSON, cf. commentaire des volumes
      # "robot" plus bas) : OFF par défaut, comme gaze_follower -- un lancement
      # explicite (ANIMATIONS=true docker compose ... up) est requis.
      - ANIMATIONS=${ANIMATIONS:-false}
    network_mode: "host"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-/tmp/.docker.xauth}:${XAUTHORITY:-/tmp/.docker.xauth}:rw
      # Accès GPU pour le rendu de la GUI Gazebo (Intel/AMD).
      - /dev/dri:/dev/dri
      # Sources montées par-dessus la copie de l'image : itération sans rebuild.
      - ../../ros2_dependencies/robot_description:/home/ros2_ws/src/robot_description
      - ../../ros2_dependencies/robot_sim:/home/ros2_ws/src/robot_sim
      - ../../ros2_dependencies/robot_interfaces:/home/ros2_ws/src/robot_interfaces
      - ../../ros2_dependencies/robot_drive:/home/ros2_ws/src/robot_drive
      - ../../scripts/launch-sim-in-docker.sh:/home/ros2_ws/launch-sim-in-docker.sh
      # json/ : mêmes fichiers de séquences/couleurs LED que le vrai robot,
      # lus par leds_sim_node (params robot_lights_json/lights_base_json/colors_json).
      - ../../../json:/home/ros2_ws/json

      # --- Paquet "robot" (animations_node, param animations:=true du launch sim) ---
      # Reproduit la structure assemblée par Ansible sur le vrai robot
      # (setup.py/package.xml de conf/ros2/ + le module robot/ + dadou_utils_ros/
      # + json/, tous à plat dans le même dossier ros2_ws/src/robot/, cf.
      # dadou_utils_ros/ansible/roles/synchronise + commentaire détaillé dans
      # Dockerfile-sim). dadou_utils_ros/ est monté ici via son VRAI chemin
      # (dépôt frère) et non via le symlink racine dadou_robot_ros/dadou_utils_ros :
      # ce dernier sort du contexte de build Docker (testé : COPY échoue avec
      # "too many links"), mais un volume compose n'a pas cette restriction --
      # c'est le SEUL endroit d'où dadou_utils_ros arrive dans le conteneur sim.
      - ../../ros2:/home/ros2_ws/src/robot
      - ../../../robot:/home/ros2_ws/src/robot/robot
      - ../../../../dadou_utils_ros:/home/ros2_ws/src/robot/dadou_utils_ros
      - ../../../json:/home/ros2_ws/src/robot/json
